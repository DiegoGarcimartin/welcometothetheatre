<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Teatro de los Cuentos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rojo: #e23b4e;
    --rojo-osc: #a8132a;
    --oro: #ffd25a;
    --texto: #3a2a14;
  }

  html, body { height: 100%; }
  body {
    font-family: 'Baloo 2', system-ui, sans-serif;
    color: var(--texto);
    overflow: hidden;
    background: #fff7e6;
    user-select: none;
    -webkit-user-select: none;
  }

  #app { position: fixed; inset: 0; overflow: hidden; }

  /* ── Escena (decorado del cuento) ── */
  #scene {
    position: absolute; inset: 0; z-index: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(180deg, #bfe3ff 0%, #d8f0c0 100%);
    transition: background 0.8s ease;
  }
  #scene-emoji {
    font-size: clamp(5rem, 20vw, 13rem);
    line-height: 1.1; text-align: center;
    filter: drop-shadow(0 8px 14px rgba(0,0,0,0.18));
    animation: floaty 3s ease-in-out infinite;
  }
  @keyframes floaty { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }

  /* Foto del objeto del niño, incrustada en la escena */
  #scene-photo {
    position: absolute; top: 50%; left: 50%;
    width: clamp(120px, 26vw, 240px); aspect-ratio: 1;
    transform: translate(-50%, 18%) scale(0); opacity: 0;
    border: 7px solid #fff; border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    object-fit: cover; z-index: 2;
    transition: transform 0.6s cubic-bezier(.2,1.3,.4,1), opacity 0.4s;
  }
  #scene-photo.show { transform: translate(-50%, 18%) scale(1) rotate(-3deg); opacity: 1; }

  /* ── Cortinas de teatro ── */
  #curtain-left, #curtain-right {
    position: absolute; top: 0; width: 52%; height: 100%; z-index: 10;
    background: repeating-linear-gradient(to right, var(--rojo-osc) 0, var(--rojo) 22px, var(--rojo-osc) 44px);
    transition: transform 1.4s cubic-bezier(0.77,0,0.18,1);
  }
  #curtain-left { left: 0; } #curtain-right { right: 0; }
  #curtain-left::before, #curtain-right::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 54px;
    background: linear-gradient(180deg, #7a0f1f, transparent); border-bottom: 5px solid var(--oro);
  }
  .abierto #curtain-left  { transform: translateX(-96%); }
  .abierto #curtain-right { transform: translateX(96%); }

  /* ── Estrellas de progreso ── */
  #stars { position: absolute; top: 14px; left: 0; right: 0; z-index: 13;
    display: flex; gap: 8px; justify-content: center; pointer-events: none; }
  #stars span { font-size: 1.8rem; filter: grayscale(1) opacity(0.4); transition: all .3s; }
  #stars span.on { filter: none; transform: scale(1.15); }

  /* ── Subtítulo grande ── */
  #subtitle-bar {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 13;
    min-height: 16vh; display: flex; align-items: center; justify-content: center;
    padding: 18px 28px 26px;
    background: linear-gradient(0deg, rgba(255,255,255,0.96) 60%, rgba(255,255,255,0));
  }
  #subtitle {
    font-size: clamp(1.3rem, 3.4vw, 2.1rem); font-weight: 700; text-align: center;
    max-width: 900px; line-height: 1.25; color: var(--texto);
  }

  /* ── Portada ── */
  #landing {
    position: absolute; inset: 0; z-index: 30;
    background: radial-gradient(circle at 50% 20%, #fff3c4, #ffd98a 70%, #ffb86b);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4vh; padding: 4vh 4vw; text-align: center;
  }
  #landing.hidden { display: none; }
  #landing h1 {
    font-size: clamp(2.2rem, 7vw, 4.6rem); font-weight: 800; color: var(--rojo);
    text-shadow: 0 3px 0 #fff, 0 6px 18px rgba(0,0,0,0.15); line-height: 1.05;
  }
  #landing .sub { font-size: clamp(1rem, 2.4vw, 1.4rem); font-weight: 600; color: #7a5a20; margin-top: -1.5vh; }
  #tales { display: flex; gap: 3vw; flex-wrap: wrap; justify-content: center; }
  .tale-card {
    background: #fff; border: 5px solid var(--oro); border-radius: 28px;
    width: clamp(150px, 26vw, 230px); padding: 22px 16px; cursor: pointer;
    box-shadow: 0 10px 24px rgba(0,0,0,0.15); transition: transform .15s, box-shadow .15s;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }
  .tale-card:hover, .tale-card:active { transform: translateY(-8px) scale(1.04); box-shadow: 0 16px 32px rgba(0,0,0,0.22); }
  .tale-card .cover { font-size: clamp(3rem, 9vw, 5rem); }
  .tale-card .name { font-size: clamp(1.05rem, 2.6vw, 1.5rem); font-weight: 700; color: var(--texto); }

  /* ── Tarjeta de título ── */
  #titlecard {
    position: absolute; inset: 0; z-index: 16;
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    background: rgba(0,0,0,0.35);
  }
  #titlecard.show { display: flex; }
  #titlecard .big { font-size: clamp(2rem, 6vw, 4rem); font-weight: 800; color: #fff;
    text-shadow: 0 3px 16px rgba(0,0,0,0.5); text-align: center; }
  #titlecard .emo { font-size: clamp(3rem, 10vw, 6rem); }

  /* ── Captura ── */
  #capture {
    position: absolute; inset: 0; z-index: 20; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 2.5vh;
    background: radial-gradient(circle at 50% 40%, #fff7e6, #ffe1a8);
    padding: 3vh 4vw; text-align: center;
  }
  #capture.show { display: flex; }
  #capture .ask { font-size: clamp(1.3rem, 3.6vw, 2.2rem); font-weight: 800; color: var(--rojo);
    max-width: 800px; line-height: 1.2; }
  #cam-wrap {
    position: relative; width: clamp(220px, 46vw, 380px); aspect-ratio: 1;
    border-radius: 50%; overflow: hidden; border: 8px dashed var(--oro);
    background: #000; box-shadow: 0 12px 30px rgba(0,0,0,0.25);
  }
  #cam-wrap.reading { animation: pulse 0.7s ease-in-out infinite alternate; }
  @keyframes pulse { from{box-shadow:0 0 0 0 rgba(255,210,90,.5)} to{box-shadow:0 0 0 16px rgba(255,210,90,0)} }
  #cam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  #cam-msg { position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
    text-align: center; padding: 16px; background: #2a1c08; color: #ffd98a; font-weight: 700; }
  #cam-wrap.failed #cam-msg { display: flex; } #cam-wrap.failed #cam { display: none; }
  #countdown { font-size: clamp(3.5rem, 12vw, 8rem); font-weight: 800; color: var(--rojo);
    text-shadow: 0 4px 0 #fff; min-height: 1.1em; }
  #reading-txt { font-size: clamp(1.2rem, 3vw, 1.8rem); font-weight: 700; color: #7a5a20; min-height: 1.2em; }

  /* ── Recap (librito) ── */
  #recap {
    position: absolute; inset: 0; z-index: 30; display: none;
    flex-direction: column; background: #fff7e6; padding: 4vh 5vw; overflow-y: auto; gap: 2.4vh;
  }
  #recap.show { display: flex; }
  #recap h2 { font-size: clamp(1.8rem, 6vw, 3.2rem); font-weight: 800; color: var(--rojo); text-align: center; }
  .recap-page { display: flex; align-items: center; gap: 18px; background: #fff; border: 4px solid var(--oro);
    border-radius: 20px; padding: 14px 18px; box-shadow: 0 6px 16px rgba(0,0,0,0.08); max-width: 760px;
    margin: 0 auto; width: 100%; }
  .recap-page img { width: 84px; height: 84px; object-fit: cover; border-radius: 14px; border: 3px solid var(--oro); flex-shrink: 0; }
  .recap-page .emo { font-size: 3.2rem; flex-shrink: 0; }
  .recap-page p { font-size: clamp(1rem, 2.4vw, 1.3rem); font-weight: 600; line-height: 1.3; }
  #btn-again { align-self: center; background: var(--rojo); color: #fff; border: none; border-radius: 999px;
    padding: 16px 44px; font-family: inherit; font-size: 1.4rem; font-weight: 800; cursor: pointer;
    box-shadow: 0 8px 0 var(--rojo-osc); margin: 1vh 0 3vh; }
  #btn-again:active { transform: translateY(4px); box-shadow: 0 4px 0 var(--rojo-osc); }

  .spark { position: absolute; font-size: 2rem; pointer-events: none; z-index: 9;
    animation: sparkle 0.9s ease-out forwards; }
  @keyframes sparkle { 0%{transform:scale(0) rotate(0);opacity:1} 100%{transform:scale(1.6) rotate(40deg);opacity:0} }
</style>
</head>
<body>
<div id="app">

  <!-- Escena -->
  <div id="scene">
    <div id="scene-emoji">📖</div>
    <img id="scene-photo" alt="">
  </div>

  <!-- Cortinas -->
  <div id="curtain-left"></div>
  <div id="curtain-right"></div>

  <!-- Progreso -->
  <div id="stars"></div>

  <!-- Título del cuento -->
  <div id="titlecard"><div class="emo" id="tc-emo"></div><div class="big" id="tc-title"></div></div>

  <!-- Captura de objeto -->
  <div id="capture">
    <div class="ask" id="cap-ask">¡Enséñame algo!</div>
    <div id="cam-wrap">
      <video id="cam" autoplay muted playsinline></video>
      <div id="cam-msg">📷 Necesito ver por la cámara.<br>Pídele a un mayor que dé permiso.</div>
    </div>
    <div id="countdown"></div>
    <div id="reading-txt"></div>
  </div>

  <!-- Subtítulo -->
  <div id="subtitle-bar"><div id="subtitle"></div></div>

  <!-- Portada -->
  <div id="landing">
    <h1>El Teatro<br>de los Cuentos</h1>
    <div class="sub">Elige un cuento y enséñale tus cosas a la cámara ✨</div>
    <div id="tales"></div>
  </div>

  <!-- Recap -->
  <div id="recap">
    <h2>✨ Tu cuento ✨</h2>
    <div id="recap-pages"></div>
    <button id="btn-again">🎭 ¡Otra vez!</button>
  </div>

</div>

<script>
// ── Refs ──
const $ = id => document.getElementById(id);
const app = $('app'), scene = $('scene'), sceneEmoji = $('scene-emoji'), scenePhoto = $('scene-photo');
const stars = $('stars'), subtitle = $('subtitle'), landing = $('landing'), talesBox = $('tales');
const titlecard = $('titlecard'), tcEmo = $('tc-emo'), tcTitle = $('tc-title');
const capture = $('capture'), capAsk = $('cap-ask'), camWrap = $('cam-wrap'), cam = $('cam');
const countdown = $('countdown'), readingTxt = $('reading-txt');
const recap = $('recap'), recapPages = $('recap-pages'), btnAgain = $('btn-again');

// ── Estado ──
let tale = null;            // {id,title,emoji,scenes:[...]}
let storyText = '';
let mediaStream = null;
let camOk = false;
const captureCanvas = document.createElement('canvas');
const pages = [];          // {emoji, photo, text} para el recap

// ── Voz (cuentacuentos, lenta y clara) ──
const synth = window.speechSynthesis;
function speak(text, onDone) {
  synth.cancel();
  if (!text) { if (onDone) onDone(); return; }
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-ES'; u.rate = 0.92; u.pitch = 1.08;
  u.onend = () => onDone && onDone();
  u.onerror = () => onDone && onDone();
  const vs = synth.getVoices().filter(v => v.lang && v.lang.toLowerCase().startsWith('es'));
  const pick = vs.find(v => /google/i.test(v.name)) || vs.find(v => v.lang.replace('_','-')==='es-ES') || vs[0];
  if (pick) { u.voice = pick; u.lang = pick.lang; }
  synth.speak(u);
}
const speakAndWait = t => new Promise(r => speak(t, r));
const delay = ms => new Promise(r => setTimeout(r, ms));

// ── Sonido de magia (chispa suave sintetizada) ──
let actx = null;
function initAudio() { try { actx = actx || new (window.AudioContext||window.webkitAudioContext)(); if (actx.state==='suspended') actx.resume(); } catch(e){} }
function magicSound() {
  if (!actx) return;
  const t0 = actx.currentTime;
  [660, 880, 1320].forEach((f,i) => {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type='sine'; o.frequency.value=f;
    g.gain.setValueAtTime(0.0001, t0+i*0.08);
    g.gain.exponentialRampToValueAtTime(0.18, t0+i*0.08+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+i*0.08+0.4);
    o.connect(g).connect(actx.destination); o.start(t0+i*0.08); o.stop(t0+i*0.08+0.42);
  });
}

// ── API ──
async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  return (await fetch(path, opts)).json();
}
async function narrate(opts) {
  try {
    const r = await api('POST','/narrate', { tale_id: tale.id, scene_index: opts.scene_index||0,
      new_object: opts.new_object||'', story_so_far: storyText.trim(), mode: opts.mode });
    return r.line || opts.fallback;
  } catch(e) { return opts.fallback; }
}

// ── Portada ──
async function loadTales() {
  try {
    const r = await api('GET','/tales');
    talesBox.innerHTML = '';
    r.tales.forEach(t => {
      const c = document.createElement('div'); c.className = 'tale-card';
      c.innerHTML = `<div class="cover">${t.cover}</div><div class="name">${t.title}</div>`;
      c.onclick = () => startShow(t.id);
      talesBox.appendChild(c);
    });
  } catch(e) { talesBox.innerHTML = '<div class="name">No se pudo cargar 😢</div>'; }
}

// ── Cámara ──
async function initCamera() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ video:{facingMode:'environment'}, audio:false });
    cam.srcObject = mediaStream; camWrap.classList.remove('failed'); camOk = true;
  } catch(e) {
    try { mediaStream = await navigator.mediaDevices.getUserMedia({ video:true, audio:false });
      cam.srcObject = mediaStream; camWrap.classList.remove('failed'); camOk = true; }
    catch(e2) { camWrap.classList.add('failed'); camOk = false; }
  }
}
function grabFrame() {
  if (!camOk || !cam.videoWidth) return null;
  captureCanvas.width = cam.videoWidth; captureCanvas.height = cam.videoHeight;
  captureCanvas.getContext('2d').drawImage(cam, 0, 0);
  return captureCanvas.toDataURL('image/jpeg', 0.85);
}
function stopCamera() { if (mediaStream) { mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; } }

// ── Estrellas ──
function buildStars(n) { stars.innerHTML=''; for(let i=0;i<n;i++){const s=document.createElement('span');s.textContent='⭐';stars.appendChild(s);} }
function fillStar(i) { const s=stars.children[i]; if(s) s.classList.add('on'); }

function sparkleBurst() {
  const emojis=['✨','🌟','⭐','💫'];
  for(let i=0;i<10;i++){ const s=document.createElement('div'); s.className='spark';
    s.textContent=emojis[i%emojis.length];
    s.style.left=(35+Math.random()*30)+'%'; s.style.top=(30+Math.random()*30)+'%';
    scene.appendChild(s); setTimeout(()=>s.remove(),900); }
}

// ── Flujo ──
async function startShow(taleId) {
  initAudio();
  tale = await api('GET','/tale/'+taleId);
  storyText = ''; pages.length = 0;
  buildStars(tale.scenes.length);
  landing.classList.add('hidden');
  scenePhoto.classList.remove('show'); scenePhoto.removeAttribute('src');
  sceneEmoji.textContent = tale.cover;
  scene.style.background = 'linear-gradient(180deg,#bfe3ff,#d8f0c0)';

  await initCamera();
  app.classList.add('abierto');           // se abren las cortinas
  await delay(1400);

  // Título
  tcEmo.textContent = tale.cover; tcTitle.textContent = tale.title;
  titlecard.classList.add('show'); await delay(2200); titlecard.classList.remove('show');

  // Intro
  const intro = await narrate({ mode:'intro', fallback:'Érase una vez una preciosa historia a punto de empezar.' });
  storyText = intro; subtitle.textContent = intro; await speakAndWait(intro);

  // Escenas
  for (let i=0; i<tale.scenes.length; i++) await sceneBeat(i);

  // Final
  const end = await narrate({ mode:'ending', fallback:'Y colorín colorado, este precioso cuento se ha acabado.' });
  storyText += ' ' + end; subtitle.textContent = end; await speakAndWait(end);
  await delay(600);
  app.classList.remove('abierto');         // se cierran las cortinas
  await delay(1400);
  stopCamera();
  showRecap();
}

async function sceneBeat(i) {
  const sc = tale.scenes[i];
  scene.style.background = `linear-gradient(180deg, ${sc.bg}, #ffffff)`;
  sceneEmoji.textContent = sc.emoji;
  scenePhoto.classList.remove('show'); scenePhoto.removeAttribute('src');

  // 1) Pedir objeto
  capAsk.textContent = sc.prompt;
  countdown.textContent = ''; readingTxt.textContent = '';
  capture.classList.add('show');
  subtitle.textContent = sc.prompt;
  for (let n=3; n>=1; n--) { countdown.textContent = n; await delay(1000); }
  countdown.textContent = '';

  // 2) Leer el objeto (varios intentos)
  camWrap.classList.add('reading'); readingTxt.textContent = '✨ Mirando bien…';
  let object = null, photo = null;
  for (let t=0; t<6; t++) {
    const frame = grabFrame();
    if (frame && !photo) photo = frame;
    try { const cap = await api('POST','/capture',{image:frame}); if (cap.detected) { object = cap.object; break; } }
    catch(e){}
    await delay(380);
  }
  camWrap.classList.remove('reading');
  if (!object) object = sc.default;        // sin detección → elemento clásico
  readingTxt.textContent = `¡${object}!`;
  await delay(1000);
  capture.classList.remove('show');

  // 3) El objeto entra en la escena (foto + magia)
  if (photo) { scenePhoto.src = photo; requestAnimationFrame(()=>scenePhoto.classList.add('show')); }
  magicSound(); sparkleBurst();
  await delay(700);

  // 4) Narrar la sustitución
  const line = await narrate({ mode:'weave', scene_index:i, new_object:object,
    fallback:`Y entonces apareció ${object} en la historia, como por arte de magia.` });
  subtitle.textContent = line; storyText += ' ' + line;
  pages.push({ emoji: sc.emoji, photo, text: line });
  await speakAndWait(line);
  fillStar(i);
  await delay(400);
}

function showRecap() {
  recapPages.innerHTML = '';
  pages.forEach(p => {
    const d = document.createElement('div'); d.className = 'recap-page';
    const media = p.photo ? `<img src="${p.photo}">` : `<div class="emo">${p.emoji}</div>`;
    d.innerHTML = `${media}<p>${p.text}</p>`;
    recapPages.appendChild(d);
  });
  recap.classList.add('show');
}
btnAgain.onclick = () => location.reload();

// init
window.addEventListener('load', () => { synth.getVoices(); loadTales(); });
</script>
</body>
</html>
